name: dagger

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # PR 阶段：只跑测试，不发布
  test:
    name: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "latest"
          module: "./dagger"
          args: test --source=app

  # Merge 到 main：测试 + 发布
  publish:
    name: publish
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish to npm
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "latest"
          module: "./dagger"
          args: publish --source=app --npm-token=env:NPM_TOKEN
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
